<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>CtrlGasto - Registro</title>
</head>
<body>
    <div class="card">
        <h1>Registro</h1>
    <form id="register-form">
        <label for="name">Nombre:</label>
        <input type="text" id="name" placeholder="Tu nombre">
        <label for="lastname">Apellido:</label>
        <input type="text" id="lastname" placeholder="Tu apellido">
        <label for="dni">DNI:</label>
        <input type="number" id="dni" placeholder="Tu DNI">
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Tu email">
        <label for="password">Contraseña:</label>
        <input type="password" id="password" placeholder="Tu contraseña">
        <label for="confirm-password">Confirmar contraseña:</label>
        <input type="password" id="confirm-password" placeholder="Confirma tu contraseña">
        <label for="rol">Rol:</label>
        <select id="rol">
            <option value="usuario">Usuario</option>
            <option value="asesor">Asesor</option>
        </select>
        <button type="submit">Registrarse</button>
    </form>
    <p>¿Ya tenés cuenta? <a href="index.html">Inicia sesión</a></p>
    </div>
    
</body>
</html>
